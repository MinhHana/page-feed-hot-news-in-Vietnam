services:
  - type: web
    name: vietnam-news-matrix
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: NEWS_CACHE_TTL
        value: "600"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: AI_ENABLED
        value: "true"
      - key: AI_DAILY_REQUEST_LIMIT
        value: "50"
      - key: AI_BRIEF_CACHE_TTL
        value: "900"
      - key: AI_DIGEST_MAX_ARTICLES
        value: "200"
      - key: AI_DIGEST_CACHE_TTL
        value: "1800"
      - key: AI_DIGEST_DAILY_LIMIT
        value: "20"
      - key: XAI_API_KEY
        sync: false
      - key: AI_GROK_MODEL
        value: "grok-4.3"
