name: Update News and Deploy

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and merge news
        run: python scripts/fetch_news.py

      - name: Commit updated news data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: cập nhật tin tức tự động"
          file_pattern: feed/news.json

      - name: Prepare site bundle
        run: |
          mkdir -p _site
          cp index.html _site/
          cp .nojekyll _site/ 2>/dev/null || true
          cp -r assets _site/
          cp -r feed _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
